services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.1.1
    container_name: ai-socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 0
      INFO: 1
      NETWORKS: 0
      NODES: 0
      PLUGINS: 0
      POST: 1
      SERVICES: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - control_net

  brain:
    build:
      context: ./brain
    container_name: ai-brain
    restart: unless-stopped
    environment:
      DOCKER_HOST: tcp://socket-proxy:2375
      WORKER_CONTAINER: ai-worker
      HEARTBEAT_SECONDS: ${HEARTBEAT_SECONDS:-25}
      LOCAL_MODEL: ${LOCAL_MODEL:-ollama/gemma4:26b}
      LOCAL_FALLBACK_MODEL: ${LOCAL_FALLBACK_MODEL:-ollama/gemma3:12b}
      CLOUD_MODEL: ${CLOUD_MODEL:-gemini/gemini-2.5-flash}
      OLLAMA_API_BASE: ${OLLAMA_API_BASE:-http://host.docker.internal:11434}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LITELLM_LOG: INFO
    ports:
      - "8000:8000"
    depends_on:
      - socket-proxy
      - worker
    networks:
      - control_net

  worker:
    build:
      context: ./worker
    container_name: ai-worker
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    mem_limit: 4g
    cpus: 2.0
    command: ["sleep", "infinity"]
    networks:
      - sandbox_net

networks:
  control_net:
    driver: bridge
  sandbox_net:
    driver: bridge
    internal: true
