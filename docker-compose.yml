services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.1.1
    container_name: ai-socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 0
      INFO: 1
      NETWORKS: 0
      NODES: 0
      PLUGINS: 0
      POST: 1
      SERVICES: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - control_net

  brain:
    build:
      context: .
      dockerfile: brain/Dockerfile
    container_name: ai-brain
    restart: unless-stopped
    environment:
      DOCKER_HOST: tcp://socket-proxy:2375
      WORKER_CONTAINER: ai-worker
      HEARTBEAT_SECONDS: ${HEARTBEAT_SECONDS:-25}
      LOCAL_QUARANTINE_MODEL: ${LOCAL_QUARANTINE_MODEL:-ollama/qwen3.5:9b}
      LOCAL_PRIVILEGED_MODEL: ${LOCAL_PRIVILEGED_MODEL:-ollama/qwen2.5-coder:14b}
      OLLAMA_API_BASE: ${OLLAMA_API_BASE:-http://host.docker.internal:11434}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: art_of_ia
      PGUSER: postgres
      PGPASSWORD: secretpassword
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: secretpassword
      LITELLM_LOG: INFO
    ports:
      - "8000:8000"
    volumes:
      - ./brain/app:/app/app
      - ./planner.py:/app/planner.py
      - ./main_orchestrator.py:/app/main_orchestrator.py
      - ./dual_llm_pattern.py:/app/dual_llm_pattern.py
      - ./semantic_memory.py:/app/semantic_memory.py
      - ./benchmark_runner.py:/app/benchmark_runner.py
      - ./scripts:/app/scripts
      - waf_logs:/app/logs:ro
    depends_on:
      - socket-proxy
      - worker
      - mcp-server
    networks:
      - control_net

  mcp-server:
    build:
      context: ./mcp_server
    container_name: ai-mcp-server
    restart: unless-stopped
    environment:
      DOCKER_HOST: tcp://socket-proxy:2375
      WORKER_CONTAINER: ai-worker
      MCP_TRANSPORT: sse
      MCP_HOST: 0.0.0.0
    volumes:
      - ./mcp_server:/app
    depends_on:
      - socket-proxy
    networks:
      - control_net

  worker:
    build:
      context: ./worker
    container_name: ai-worker
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    mem_limit: 4g
    cpus: 2.0
    command: ["sleep", "infinity"]
    networks:
      - sandbox_net

  db:
    image: pgvector/pgvector:pg16
    container_name: ai-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: art_of_ia
      POSTGRES_PASSWORD: secretpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - control_net

  neo4j:
    image: neo4j:5.12
    container_name: ai-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/secretpassword
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - control_net

  # ── BENCHMARK TARGETS (Phase 5) ──────────────────────────────────
  target-dvwa:
    image: vulfocus/dvwa
    container_name: target-dvwa
    restart: unless-stopped
    networks:
      - sandbox_net

  target-struts2:
    image: vulfocus/struts2-cve_2017_5638
    container_name: target-struts2
    restart: unless-stopped
    networks:
      - sandbox_net

  target-lfi:
    image: nginx:alpine
    container_name: target-lfi
    restart: unless-stopped
    volumes:
      - ./tests/lfi_fakes:/usr/share/nginx/html/data
    networks:
      - sandbox_net

  target-waf:
    image: owasp/modsecurity-crs:nginx-alpine
    container_name: target-waf
    restart: unless-stopped
    environment:
      BACKEND: http://target-dvwa:80
      MODSEC_AUDIT_LOG: /var/log/modsec_audit.log
      MODSEC_AUDIT_LOG_TYPE: Serial
    volumes:
      - waf_logs:/var/log
    networks:
      - sandbox_net

networks:
  control_net:
    driver: bridge
  sandbox_net:
    driver: bridge
    internal: true

volumes:
  pgdata:
  neo4j_data:
  waf_logs:
